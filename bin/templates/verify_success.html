<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verified</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f1f5f9; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #10b981; margin-bottom: 10px; }
        a { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #c62828; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Account Verified!</h1>
        <p>Your registration is complete. You can now log in.</p>
        <a th:href="@{/login}">Go to Login</a>
    </div>
</body>
</html>
