server.port=8081
server.servlet.context-path=/payroll-system

# Shared database with EAC HR (Option A: HR owns employee + attendance)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/eac_hr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Manila&connectTimeout=15000&socketTimeout=60000
spring.datasource.username=root
spring.datasource.password=7002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Do not alter tables; HR app maintains schema (employee, attendance, leave_requests)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.thymeleaf.cache=false
