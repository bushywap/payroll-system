<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user_login.css}">

    <style>
        .login-card {
            display: block !important;
            opacity: 1 !important;
            transform: translateY(0) !important;
            animation: none !important;
            margin-top: 50px;
        }
        body {
            background-color: #f4f6f9;
        }
    </style>
</head>
<body>

    <main class="login-card" role="main">
        <div class="header-text">
            <h2>Reset Password</h2>
            <p>Create a new secure password.</p>
        </div>

        <input type="hidden" id="token" th:value="${token}">

        <div class="field">
            <input type="password" id="newPass" placeholder=" ">
            <label>New Password</label>
            <i class="fa-solid fa-lock input-icon"></i> 
        </div>

        <div class="field">
            <input type="password" id="confirmPass" placeholder=" ">
            <label>Confirm Password</label>
            <i class="fa-solid fa-lock input-icon"></i>
        </div>

        <button id="saveBtn" class="btn-primary">
            <span class="btn-text">Update Password</span>
            <div class="loader" style="display: none;"></div>
        </button>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script th:src="@{/js/reset_password.js}"></script>
</body>
</html>
